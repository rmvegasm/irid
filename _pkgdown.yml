url: https://irid.kylehusmann.com
repo:
  url:
    home: https://github.com/khusmann/irid
    source: https://github.com/khusmann/irid/blob/HEAD/
    issue: https://github.com/khusmann/irid/issues/
    user: https://github.com/
template:
  bootstrap: 5
  light-switch: true
  includes:
    in_header: |
      <script data-goatcounter="https://irid.goatcounter.com/count"
              async src="//gc.zgo.at/count.js"></script>

reference:
  - title: App Entry Points
    desc: Create and embed irid applications
    contents:
      - iridApp
      - iridOutput
      - renderIrid

  - title: Control Flow
    desc: Reactive control flow for conditional and list rendering
    contents:
      - When
      - Each
      - Match
      - Case
      - Default

  - title: Outputs
    desc: Embed Shiny render/output pairs in irid tag trees
    contents:
      - Output
      - PlotOutput
      - TableOutput
      - DTOutput

  - title: Wiring
    desc: Configure per-slot dispatch and two-way widget props
    contents:
      - irid_wire
      - irid_immediate
      - irid_throttle
      - irid_debounce
      - irid_dom_opts

  - title: Widgets
    desc: Build custom irid widgets
    contents:
      - IridWidget

  - title: Reactive Basics
    desc: Reactive primitives — Shiny's `reactiveVal` plus irid's hierarchical store and callable proxy
    contents:
      - reactiveVal
      - reactiveStore
      - reactiveProxy

navbar:
  components:
    examples:
      text: Examples
      href: articles/examples.html
  structure:
    left: [intro, reference, examples, news]
